<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — Study Flow</title>
  <link rel="stylesheet" href="profile.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://kit.fontawesome.com/a3fd1d4ff0.js" crossorigin="anonymous"></script>
</head>
<body>

<div class="profile-card">

  <!-- Cover Banner -->
  <div class="profile-banner"></div>

  <!-- Profile Header -->
  <div class="profile-header">

    <div class="avatar-wrapper">
      <img
        src="file/profile.jpg"
        alt="Profile Picture"
        class="profile-avatar"
        id="profileAvatar"
        onerror="this.src='https://ui-avatars.com/api/?name=Precious+Emmanuel&background=4f46e5&color=fff&size=180'"
      >
      <button type="button" class="change-photo-btn" id="changePhotoBtn" title="Change photo">
        <i class="fa-solid fa-camera"></i>
      </button>
      <input type="file" id="imageUpload" accept="image/*" hidden>
    </div>

    <div class="profile-info">
      <h2 id="profileName">Precious Emmanuel</h2>

      <p class="headline" id="profileHeadline">

      </p>

      <p class="location" id="profileLocation">
        <i class="fa-solid fa-location-dot"></i>
        Port Harcourt, Rivers State, Nigeria
      </p>

      <div class="profile-links">
        <a href="#"><i class="fa-brands fa-linkedin"></i> Facebook</a>
        <a href="#"><i class="fa-brands fa-github"></i>Instagram</a>
        <a href="#"><i class="fa-solid fa-globe"></i> Portfolio</a>
      </div>
    </div>

  </div>

  <!-- About -->
  <div class="profile-section">
    <h3>About</h3>
    <textarea id="aboutTextarea" rows="5">Passionate Frontend Developer focused on building responsive, accessible, and user-friendly web applications. Skilled in HTML, CSS, JavaScript, and modern UI design principles. Constantly learning new technologies and improving my development workflow.</textarea>
  </div>

  <!-- Skills -->
  <div class="profile-section">
    <h3>subjects</h3>
    <div class="skills-list">
      <span>Maths</span>
      <span>English</span>
      <span>Physics</span>
      <span>Chemistry</span>
      <span>Biology</span>
      <span>Geogreaphy</span>
    </div>
  </div>

  <!-- Contact Information -->
  <div class="profile-section">
    <h3>Contact Information</h3>
    <div class="form-group">
      <label for="emailInput">Email</label>
      <input type="email" id="emailInput" value="amakop20@gmail.com">
    </div>
    <div class="form-group">
      <label for="phoneInput">Phone Number</label>
      <input type="tel" id="phoneInput" value="+234 701 389 2949">
    </div>
  </div>

  <button type="button" class="save-btn" id="saveBtn">
    <i class="fa-solid fa-floppy-disk"></i> Save Profile
  </button>

</div>

<div class="toast" id="toast"></div>

<script src="profile.js"></script>
</body>
</html>
